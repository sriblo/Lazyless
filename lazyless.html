<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazyless — тренировки</title>
<meta name="theme-color" content="#c6ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lazyless">
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Golos+Text:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --accent: #c6ff00;
    --text: #e8e8e8;
    --muted: #555;
    --done-bg: #0f1f00;
    --done-border: #1e3a00;
  }

  .app-header {
    padding: 12px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .app-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  .app-tagline {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 80px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .subtitle { color: var(--muted); font-size: 0.75rem; margin-bottom: 20px; }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }

  .tab {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 12px 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab.rest-tab { border-color: #1a1a1a; }
  .tab.rest-tab.active { background: #222; color: var(--text); border-color: #333; }
  .tab.today-tab::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* DAY VIEW */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
  }

  .day-subtitle { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* PLAN SCENARIOS */
  .plan-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .plan-scenario {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .plan-scenario.completed { border-color: var(--done-border); background: var(--done-bg); }

  .plan-scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  .plan-scenario-header:active { opacity: 0.8; }

  .sc-icon { font-size: 1.3rem; flex-shrink: 0; }

  .sc-info { flex: 1; }

  .sc-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .plan-scenario.completed .sc-name { color: var(--accent); }

  .sc-meta { font-size: 0.72rem; color: var(--muted); }

  .sc-progress {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .plan-scenario.completed .sc-progress { color: var(--accent); }

  .mini-bar {
    height: 2px;
    background: var(--border);
    margin: 0 14px 12px;
    border-radius: 1px;
    overflow: hidden;
  }

  .mini-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 14px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* EXTRA SCENARIOS */
  .extra-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .extra-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .extra-btn:active { transform: scale(0.97); }
  .extra-btn.has-done { border-color: #2a3a00; }

  .extra-icon { font-size: 1.2rem; margin-bottom: 4px; }

  .extra-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .extra-time { font-size: 0.65rem; color: var(--muted); }

  /* REST DAY */
  .rest-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }

  .rest-emoji { font-size: 2.5rem; margin-bottom: 10px; }
  .rest-title { font-family: 'Unbounded', sans-serif; font-size: 0.85rem; margin-bottom: 8px; }
  .rest-text { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

  /* WORKOUT VIEW */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    min-height: 44px;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 16px 0 8px;
  }

  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ex-card.done { background: var(--done-bg); border-color: var(--done-border); }

  .ex-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  .ex-main:active { opacity: 0.8; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ex-card.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; color: #000; font-size: 12px; font-weight: 900; }
  .ex-card.done .check-icon { display: block; }

  .ex-body { flex: 1; }
  .ex-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 3px; }
  .ex-card.done .ex-name { color: var(--accent); }
  .ex-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 3px; }

  .tag { font-size: 0.6rem; padding: 1px 6px; border-radius: 4px; font-weight: 500; }
  .t-back    { background: #1a1000; color: #ffaa00; }
  .t-core    { background: #001020; color: #00aaff; }
  .t-chest   { background: #1a001a; color: #dd00ff; }
  .t-endure  { background: #001a10; color: #00ffaa; }
  .t-wrist   { background: #1a0a00; color: #ff6600; }
  .t-feet    { background: #0a001a; color: #9966ff; }
  .t-pelvis  { background: #001a1a; color: #00ddcc; }
  .t-stretch { background: #001a00; color: #66ff66; }
  .t-force   { background: #1a0000; color: #ff4444; }

  .ex-meta { font-size: 0.74rem; color: var(--muted); }

  .hint-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px 10px 48px;
    cursor: pointer;
    font-size: 0.72rem;
    color: var(--muted);
    min-height: 44px;
  }

  .hint-arrow {
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .hint-arrow.open { transform: rotate(90deg); }

  .hint-body {
    display: none;
    padding: 10px 14px 14px 48px;
    font-size: 0.76rem;
    color: #777;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }

  .hint-body.open { display: block; }
  .hint-body ol { padding-left: 16px; }
  .hint-body li { margin-bottom: 4px; }
  .hint-body .warn { color: #ff8800; font-size: 0.7rem; margin-top: 8px; }

  .done-screen { text-align: center; padding: 32px 20px; }
  .done-emoji { font-size: 2.8rem; margin-bottom: 12px; }
  .done-title { font-family: 'Unbounded', sans-serif; font-size: 0.95rem; color: var(--accent); margin-bottom: 6px; }
  .done-sub { font-size: 0.8rem; color: var(--muted); }

  .reset-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">LAZYLESS</div>
  <div class="app-tagline">домашние тренировки</div>
</div>

<div id="app"></div>

<script>
// ─── DATA ────────────────────────────────────────────────

const TAGS = {
  back:    { cls: 't-back',    label: 'спина' },
  core:    { cls: 't-core',    label: 'пресс/кор' },
  chest:   { cls: 't-chest',   label: 'грудь' },
  endure:  { cls: 't-endure',  label: 'выносливость' },
  wrist:   { cls: 't-wrist',   label: 'запястья' },
  feet:    { cls: 't-feet',    label: 'стопы' },
  pelvis:  { cls: 't-pelvis',  label: 'таз/простата' },
  stretch: { cls: 't-stretch', label: 'растяжка' },
  force:   { cls: 't-force',   label: 'сила' },
};

const SCENARIOS = {
  back: {
    id: 'back', icon: '🔙', name: 'Спина', time: '~20 мин',
    desc: 'Поясница, осанка, позвоночник',
    sections: [
      { title: 'РАЗМИНКА', exercises: [
        { name: 'Кошка-корова', tags: ['back','stretch'], meta: '10 повторений, медленно',
          hint: ['Встань на четвереньки — колени под бёдрами, руки под плечами','Кошка: на выдохе округли спину вверх, голова вниз','Корова: на вдохе прогнись вниз, голова вверх','Движение плавное, без рывков'], warn: 'Не делай резких движений шеей' },
        { name: 'Вращение плечами', tags: ['back','stretch'], meta: '10 вперёд + 10 назад',
          hint: ['Руки вдоль тела','Поднимай плечи к ушам, отводи назад, опускай, вперёд — круг','Назад важнее — раскрывает грудь'] },
      ]},
      { title: 'ОСНОВНОЕ', exercises: [
        { name: 'Супермен', tags: ['back','force'], meta: '3 × 10 повторений',
          hint: ['Лёжа на животе, руки вытянуты вперёд','Одновременно подними руки и ноги от пола','Задержись на 3 секунды наверху','Медленно опусти — это тоже часть упражнения'], warn: 'Качает разгибатели спины — именно то что нужно для поясницы' },
        { name: 'Планка на локтях', tags: ['back','core','force'], meta: '3 × 25 секунд',
          hint: ['Локти под плечами, предплечья на полу','Тело — прямая линия от головы до пяток','Живот подтянут, не провисай в пояснице','Смотришь в пол, шея прямая','Дышишь ровно'], warn: 'Если боль в пояснице — уменьши время' },
        { name: 'Мостик', tags: ['back','core','pelvis'], meta: '3 × 12 повторений',
          hint: ['Лёжа на спине, колени согнуты, стопы на полу','Медленно поднимай таз вверх — позвонок за позвонком','Наверху — сожми ягодицы, задержись 2 сек','Опускай тоже медленно'] },
      ]},
      { title: 'ЗАВЕРШЕНИЕ', exercises: [
        { name: 'Колени к груди', tags: ['back','stretch'], meta: '2 × 45 секунд',
          hint: ['Лёжа на спине','Обними оба колена руками, подтяни к груди','Можно слегка покачиваться','Расслабь поясницу полностью'] },
      ]},
    ]
  },
  core: {
    id: 'core', icon: '⚡', name: 'Пресс и кор', time: '~20 мин',
    desc: 'Глубокие мышцы живота, стабилизация',
    sections: [
      { title: 'РАЗМИНКА', exercises: [
        { name: 'Диафрагмальное дыхание', tags: ['core','pelvis'], meta: '2 минуты',
          hint: ['Лёжа на спине, колени согнуты','Рука на животе','Вдох носом — живот поднимается','Выдох ртом — живот опускается','На выдохе расслабляй промежность вниз'], warn: 'Расслабляет таз — важнее любого упражнения' },
      ]},
      { title: 'ОСНОВНОЕ', exercises: [
        { name: 'Планка на локтях', tags: ['core','back','force'], meta: '3 × 30 секунд',
          hint: ['Локти под плечами','Тело прямое','Напрягай пресс как будто ждёшь удар в живот','Дышишь ровно'] },
        { name: 'Велосипед', tags: ['core','endure'], meta: '3 × 12 (каждая сторона)',
          hint: ['Лёжа на спине, руки за головой','Поднимаешь плечи от пола','Левый локоть к правому колену — правую вытягиваешь','Чередуешь стороны медленно'], warn: 'Если болит шея — подложи руки под голову, не тяни за неё' },
        { name: 'Обратный кегель', tags: ['pelvis','core'], meta: '3 × 10 повторений',
          hint: ['Лёжа удобно','Вдох','На выдохе — РАССЛАБЬ промежность вниз, как будто "опускается"','НЕ сжимай — именно расслабление'], warn: 'Классический кегель тебе не подходит — нужен обратный' },
        { name: 'Мостик', tags: ['core','back','pelvis'], meta: '3 × 12 повторений',
          hint: ['На спине, колени согнуты','Таз вверх медленно','Задержка 2 сек, ягодицы сжаты','Медленно вниз'] },
      ]},
      { title: 'ЗАВЕРШЕНИЕ', exercises: [
        { name: 'Диафрагмальное дыхание', tags: ['pelvis','stretch'], meta: '5 минут',
          hint: ['То же что в разминке','После нагрузки — расслабь всё','На каждом выдохе отпускай напряжение в промежности и приводящих'] },
      ]},
    ]
  },
  endure: {
    id: 'endure', icon: '🏃', name: 'Выносливость', time: '~25 мин',
    desc: 'Сердечко, дыхалка, общий тонус',

      { title: 'РАЗМИНКА', exercises: [

        { name: 'Планка с касанием плеча', tags: ['endure','core','wrist'], meta: '3 × 20 секунд',
          hint: ['Планка на прямых руках','Поочерёдно касайся противоположного плеча','Таз не крути'] },
        { name: 'Берпи упрощённые', tags: ['endure','force'], meta: '2 × 8 повторений',
          hint: ['Стоишь прямо','Приседаешь, руки на пол','Шагаешь ногами назад в планку','Возвращаешь ноги, встаёшь'], warn: 'Если кружится голова — останови, это нормально' },
      ]},
      { title: 'ЗАВЕРШЕНИЕ', exercises: [
        { name: 'Ходьба на месте', tags: ['endure','feet'], meta: '3 минуты медленно',
          hint: ['Постепенно снижай темп','Восстанавливаешь дыхание'] },
      ]},
    ]
  },
  force: {
    id: 'force', icon: '💪', name: 'Сила', time: '~25 мин',
    desc: 'Мышечная масса, прогрессия нагрузки',
    sections: [
      { title: 'РАЗМИНКА', exercises: [
        { name: 'Кошка-корова', tags: ['back','stretch'], meta: '8 повторений',
          hint: ['На четвереньках','Округляй и прогибай спину поочерёдно','Медленно'] },
      ]},
      { title: 'ОСНОВНОЕ', exercises: [
        { name: 'Отжимания медленные', tags: ['force','chest','wrist'], meta: '4 × до отказа, темп 3-1-3',
          hint: ['3 сек вниз — 1 сек пауза — 3 сек вверх','Намного тяжелее обычных','Руки чуть шире плеч','Тело прямое'], warn: 'Медленный темп = максимальная нагрузка без лишнего веса' },
        { name: 'Приседания медленные', tags: ['force','feet','endure'], meta: '4 × 10, темп 3-1-3',

      { title: 'ЗАВЕРШЕНИЕ', exercises: [
        { name: 'Растяжка грудных', tags: ['stretch','chest'], meta: '2 × 30 секунд',

      ]},
    ]
  },
  wrist: {
    id: 'wrist', icon: '🤝', name: 'Запястья', time: '~15 мин',
    desc: 'Укрепление, гибкость, профилактика',
    sections: [
      { title: 'РАЗМИНКА', exercises: [

  },
  feet: {
    id: 'feet', icon: '🦶', name: 'Стопы', time: '~15 мин',
    desc: 'Боль при ходьбе, атрофия от гиподинамии',
    sections: [
      { title: 'РАЗМИНКА', exercises: [
        { name: 'Вращение стоп', tags: ['feet','stretch'], meta: '10 раз в каждую сторону',
          hint: ['Сидя, поднимаешь одну ногу','Вращаешь стопой полный круг','Медленно, чувствуй каждую точку'] },
        { name: 'Сгибание пальцев', tags: ['feet','stretch'], meta: '15 раз каждой ногой',
          hint: ['Сидя','Максимально согни пальцы','Максимально распрями и разведи','Будит мелкие мышцы стопы'] },
      ]},
      { title: 'УКРЕПЛЕНИЕ', exercises: [
        { name: 'Подъёмы на носки', tags: ['feet','endure'], meta: '3 × 20 повторений',
          hint: ['У стены (придерживаешься)','Медленно поднимаешься на носки','Задержка 1 сек наверху','Медленно опускаешься','Укрепляет свод и икры'] },
        { name: 'Ходьба на пятках', tags: ['feet','endure'], meta: '3 × 30 секунд',
          hint: ['По квартире, только на пятках','Носки подняты','Медленно'] },
        { name: 'Ходьба на носках', tags: ['feet','endure'], meta: '3 × 30 секунд',
          hint: ['По квартире на носках','Как балерина','Укрепляет свод и пальцы'] },
        { name: 'Захват полотенца пальцами', tags: ['feet','force'], meta: '2 × 15 каждой ногой',
          hint: ['Постели полотенце на пол','Пальцами ноги собери в комок','Расправь снова'] },
      ]},
      { title: 'РАСТЯЖКА', exercises: [
        { name: 'Растяжка подошвы', tags: ['feet','stretch'], meta: '2 × 30 сек каждая нога',
          hint: ['У стены','Пальцы одной ноги на стене, пятка на полу','Наклонись к стене','Растяжение в подошве'], warn: 'Лечит боль в стопах при ходьбе' },
      ]},
    ]
  },
  stretch: {
    id: 'stretch', icon: '🧘', name: 'Растяжка', time: '~20 мин',
    desc: 'Таз, приводящие, спина — всё что зажато',
    sections: [
      { title: 'ДЫХАНИЕ', exercises: [
        { name: 'Диафрагмальное дыхание', tags: ['pelvis','stretch'], meta: '10 минут',
          hint: ['Лёжа на спине, колени согнуты','Рука на животе','Вдох — живот поднимается','Выдох — живот опускается, промежность расслабляется вниз','Каждый выдох — отпускаешь напряжение в промежности и приводящих'], warn: 'Самое важное упражнение. Расслабляет гипертонус тазового дна' },
      ]},
      { title: 'РАСТЯЖКА', exercises: [
        { name: 'Бабочка', tags: ['pelvis','stretch'], meta: '3 × 60 секунд',
          hint: ['Сидишь, стопы вместе, колени в стороны','Спина прямая','НЕ дави на колени','Просто держи и дышишь — само опускается','Растягивает приводящие и тазовое дно'] },
        { name: 'Голубь лёжа', tags: ['pelvis','stretch'], meta: '2 × 45 сек каждая сторона',
          hint: ['Лёжа на спине','Правую лодыжку на левое колено','Подтяни левое колено к груди','Растяжение в правой ягодице и тазобедренном'] },
        { name: 'Растяжка подколенных', tags: ['stretch','back'], meta: '2 × 30 сек каждая нога',
          hint: ['Лёжа на спине','Поднимай ногу вверх','Колено можно чуть согнуть','Натяжение под коленом'] },
        { name: 'Колени к груди', tags: ['back','stretch'], meta: '2 × 45 секунд',
          hint: ['Лёжа на спине','Оба колена к груди','Покачивайся вперёд-назад','Расслабляет поясницу'] },
        { name: 'Кошка-корова медленная', tags: ['back','stretch'], meta: '15 повторений',
          hint: ['На четвереньках','Очень медленно','Дышишь в ритм движению'] },
      ]},
    ]
  },
};

// Weekly plan: each day has an array of scenario ids (or 'rest')
const WEEK_PLAN = [
  { label: 'ПН', name: 'Спина + Кор', scenarios: ['back', 'core'] },
  { label: 'ВТ', name: 'Отдых', rest: true, restNote: 'Активный отдых. Погуляй по квартире, подышишь. Мышцы растут в покое.' },
  { label: 'СР', name: 'Таз + Растяжка', scenarios: ['stretch', 'core'] },
  { label: 'ЧТ', name: 'Отдых', rest: true, restNote: 'День отдыха. Выпей воды, расслабь приводящие если чувствуешь напряжение.' },
  { label: 'ПТ', name: 'Сила + Выносливость', scenarios: ['force', 'endure'] },
  { label: 'СБ', name: 'Лёгкий день', scenarios: ['stretch', 'feet'] },
  { label: 'ВС', name: 'Отдых', rest: true, restNote: 'Полный отдых. Неделя сделана. Следующая — чуть тяжелее.' },
];

// ─── STATE ───────────────────────────────────────────────

let state = {
  view: 'day',       // 'day' | 'workout'
  dayIdx: 0,
  activeScenario: null,
  activeContext: null, // 'plan' | 'extra'
};

let checked = {};
try { checked = JSON.parse(localStorage.getItem('wk3_checked') || '{}'); } catch(e) {}

function save() { localStorage.setItem('wk3_checked', JSON.stringify(checked)); }

// Today's day index (Mon=0)
const todayIdx = (() => {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
})();

state.dayIdx = todayIdx;

// ─── KEYS ────────────────────────────────────────────────

function exKey(context, scenarioId, secIdx, exIdx) {
  return `${context}_${scenarioId}_${secIdx}_${exIdx}`;
}

function getProgress(context, scenarioId) {
  const sc = SCENARIOS[scenarioId];
  if (!sc) return { total: 0, done: 0 };
  let total = 0, done = 0;
  sc.sections.forEach((sec, si) => {
    sec.exercises.forEach((ex, ei) => {
      total++;
      if (checked[exKey(context, scenarioId, si, ei)]) done++;
    });
  });
  return { total, done };
}

function getDayProgress(dayIdx) {
  const day = WEEK_PLAN[dayIdx];
  if (day.rest || !day.scenarios) return { total: 0, done: 0 };
  let total = 0, done = 0;
  day.scenarios.forEach(scId => {
    const p = getProgress('plan_' + dayIdx, scId);
    total += p.total;
    done += p.done;
  });
  return { total, done };
}

// ─── ACTIONS ─────────────────────────────────────────────

function toggleEx(secIdx, exIdx) {
  const k = exKey(state.activeContext, state.activeScenario, secIdx, exIdx);
  checked[k] = !checked[k];
  save();
  render();
}

function toggleHint(id) {
  const body = document.getElementById('h-' + id);
  const arrow = document.getElementById('a-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

function openScenario(scenarioId, context) {
  state.activeScenario = scenarioId;
  state.activeContext = context;
  state.view = 'workout';
  render();
}

function openExtra(scenarioId) {
  openScenario(scenarioId, 'extra_' + state.dayIdx + '_' + scenarioId);
}

function openPlanScenario(scenarioId) {
  openScenario(scenarioId, 'plan_' + state.dayIdx);
}

function goBack() {
  state.view = 'day';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function switchDay(idx) {
  state.dayIdx = idx;
  state.view = 'day';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function resetCurrent() {
  if (!state.activeScenario || !state.activeContext) return;
  Object.keys(checked).forEach(k => {
    if (k.startsWith(state.activeContext + '_' + state.activeScenario)) delete checked[k];
  });
  save();
  render();
}

// ─── RENDER ──────────────────────────────────────────────

function renderTabs() {
  return `<div class="day-tabs">
    ${WEEK_PLAN.map((d, i) => {
      const isToday = i === todayIdx;
      const { total, done } = getDayProgress(i);
      const allDone = total > 0 && done === total;
      return `<button class="tab ${d.rest ? 'rest-tab' : ''} ${i === state.dayIdx ? 'active' : ''} ${isToday ? 'today-tab' : ''}"
        onclick="switchDay(${i})">${d.label}${allDone ? ' ✓' : ''}</button>`;
    }).join('')}
  </div>`;
}

function renderDayView() {
  const day = WEEK_PLAN[state.dayIdx];

  let html = renderTabs();

  html += `<div class="day-header">
    <div>
      <div class="day-title">${day.name}</div>
      ${state.dayIdx === todayIdx ? '<div class="day-subtitle">сегодня</div>' : ''}
    </div>
  </div>`;

  if (day.rest) {
    html += `<div class="rest-card">
      <div class="rest-emoji">🛌</div>
      <div class="rest-title">День отдыха</div>
      <div class="rest-text">${day.restNote}</div>
    </div>`;
  } else {
    // Plan scenarios
    html += `<div class="plan-label">план дня</div>`;
    day.scenarios.forEach(scId => {
      const sc = SCENARIOS[scId];
      const ctx = 'plan_' + state.dayIdx;
      const { total, done } = getProgress(ctx, scId);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const allDone = done === total && total > 0;
      html += `
        <div class="plan-scenario ${allDone ? 'completed' : ''}">
          <div class="plan-scenario-header" onclick="openPlanScenario('${scId}')">
            <div class="sc-icon">${sc.icon}</div>
            <div class="sc-info">
              <div class="sc-name">${sc.name}</div>
              <div class="sc-meta">${sc.time} · ${sc.desc}</div>
            </div>
            <div class="sc-progress">${done}/${total}</div>
          </div>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  // Extra section — all scenarios
  html += `<div class="divider"><div class="divider-line"></div><div class="divider-text">ЕЩЁ / ПО НАСТРОЕНИЮ</div><div class="divider-line"></div></div>`;
  html += `<div class="extra-grid">`;
  Object.values(SCENARIOS).forEach(sc => {
    const ctx = 'extra_' + state.dayIdx + '_' + sc.id;
    const { total, done } = getProgress(ctx, sc.id);
    const hasDone = done > 0;
    html += `
      <button class="extra-btn ${hasDone ? 'has-done' : ''}" onclick="openExtra('${sc.id}')">
        <div class="extra-icon">${sc.icon}</div>
        <div class="extra-name">${sc.name}${hasDone ? ' ·' + done + '/' + total : ''}</div>
        <div class="extra-time">${sc.time}</div>
      </button>
    `;
  });
  html += `</div>`;

  return html;
}

function renderWorkoutView() {
  const sc = SCENARIOS[state.activeScenario];
  if (!sc) return renderDayView();

  const { total, done } = getProgress(state.activeContext, state.activeScenario);
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const allDone = done === total && total > 0;

  let html = `<div class="back-btn" onclick="goBack()">← назад</div>`;
  html += `<div class="progress-row"><span>${sc.icon} ${sc.name}</span><span style="color:var(--accent)">${done}/${total}</span></div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if (allDone) {
    html += `<div class="done-screen">
      <div class="done-emoji">🔥</div>
      <div class="done-title">Сделано!</div>
      <div class="done-sub">Хорошая работа. Тело скажет спасибо.</div>
    </div>`;
  }

  sc.sections.forEach((sec, si) => {
    html += `<div class="section-label">${sec.title}</div>`;
    sec.exercises.forEach((ex, ei) => {
      const isDone = !!checked[exKey(state.activeContext, state.activeScenario, si, ei)];
      const hid = `${state.activeContext}_${state.activeScenario}_${si}_${ei}`;
      const tags = ex.tags.map(t => `<span class="tag ${TAGS[t].cls}">${TAGS[t].label}</span>`).join('');
      html += `
        <div class="ex-card ${isDone ? 'done' : ''}">
          <div class="ex-main" onclick="toggleEx(${si}, ${ei})">
            <div class="checkbox"><span class="check-icon">✓</span></div>
            <div class="ex-body">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-tags">${tags}</div>
              <div class="ex-meta">${ex.meta}</div>
            </div>
          </div>
          <div class="hint-toggle" onclick="toggleHint('${hid}')">
            <span class="hint-arrow" id="a-${hid}"></span>
            <span>как делать</span>
          </div>
          <div class="hint-body" id="h-${hid}">
            <ol>${ex.hint.map(h => `<li>${h}</li>`).join('')}</ol>
            ${ex.warn ? `<div class="warn">⚠ ${ex.warn}</div>` : ''}
          </div>
        </div>
      `;
    });
  });

  html += `<button class="reset-btn" onclick="resetCurrent()">↺ СБРОСИТЬ</button>`;
  return html;
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = state.view === 'workout' ? renderWorkoutView() : renderDayView();
}

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
