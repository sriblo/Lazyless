<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lazyless — тренировки</title>
<meta name="theme-color" content="#c6ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lazyless">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Golos+Text:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --accent: #c6ff00;
    --text: #e8e8e8;
    --muted: #555;
    --done-bg: #0f1f00;
    --done-border: #1e3a00;
  }

  .app-header {
    padding: 12px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .app-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  .app-tagline {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .hdr-right { text-align: right; }
  .hdr-points {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem; font-weight: 900;
    color: var(--accent); letter-spacing: -0.02em;
  }
  .hdr-week { font-size: 0.62rem; color: var(--muted); margin-top: 2px; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 80px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .subtitle { color: var(--muted); font-size: 0.75rem; margin-bottom: 20px; }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }

  .tab {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 12px 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab.rest-tab { border-color: #1a1a1a; }
  .tab.rest-tab.active { background: #222; color: var(--text); border-color: #333; }
  .tab.today-tab::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* DAY VIEW */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
  }

  .day-subtitle { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* PLAN SCENARIOS */
  .plan-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .plan-scenario {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .plan-scenario.completed { border-color: var(--done-border); background: var(--done-bg); }

  .plan-scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  .plan-scenario-header:active { opacity: 0.8; }

  .sc-icon { font-size: 1.3rem; flex-shrink: 0; }

  .sc-info { flex: 1; }

  .sc-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .plan-scenario.completed .sc-name { color: var(--accent); }

  .sc-meta { font-size: 0.72rem; color: var(--muted); }

  .sc-progress {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .plan-scenario.completed .sc-progress { color: var(--accent); }

  .mini-bar {
    height: 2px;
    background: var(--border);
    margin: 0 14px 12px;
    border-radius: 1px;
    overflow: hidden;
  }

  .mini-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 14px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* EXTRA SCENARIOS */
  .extra-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .extra-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .extra-btn:active { transform: scale(0.97); }
  .extra-btn.has-done { border-color: #2a3a00; }

  .extra-icon { font-size: 1.2rem; margin-bottom: 4px; }

  .extra-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .extra-time { font-size: 0.65rem; color: var(--muted); }

  /* REST DAY */
  .rest-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }

  .rest-emoji { font-size: 2.5rem; margin-bottom: 10px; }
  .rest-title { font-family: 'Unbounded', sans-serif; font-size: 0.85rem; margin-bottom: 8px; }
  .rest-text { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

  /* WORKOUT VIEW */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    min-height: 44px;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 16px 0 8px;
  }

  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ex-card.done { background: var(--done-bg); border-color: var(--done-border); }

  .ex-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 10px;
    cursor: pointer;
  }

  .ex-main:active { opacity: 0.8; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ex-card.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; color: #000; font-size: 12px; font-weight: 900; }
  .ex-card.done .check-icon { display: block; }

  .ex-body { flex: 1; }
  .ex-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 3px; }
  .ex-card.done .ex-name { color: var(--accent); }
  .ex-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }

  .tag {
    font-size: 0.58rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .t-back, .t-core, .t-chest, .t-endure, .t-wrist,
  .t-feet, .t-pelvis, .t-stretch, .t-force { background: transparent; color: var(--accent); }

  .ex-stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    flex-shrink: 0;
    min-width: 48px;
  }
  .ex-stat-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .ex-card.done .ex-stat-val { opacity: 0.5; }
  .ex-stat-unit {
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
  }

  .hint-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px 10px 48px;
    cursor: pointer;
    font-size: 0.72rem;
    color: var(--muted);
    min-height: 44px;
  }

  .hint-arrow {
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .hint-arrow.open { transform: rotate(90deg); }

  .hint-body {
    display: none;
    padding: 10px 14px 14px 48px;
    font-size: 0.76rem;
    color: #777;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }

  .hint-body.open { display: block; }
  .hint-body ol { padding-left: 16px; }
  .hint-body li { margin-bottom: 4px; }
  .hint-body .warn { color: #ff8800; font-size: 0.7rem; margin-top: 8px; }

  .done-screen { text-align: center; padding: 32px 20px; }
  .done-emoji { font-size: 2.8rem; margin-bottom: 12px; }
  .done-title { font-family: 'Unbounded', sans-serif; font-size: 0.95rem; color: var(--accent); margin-bottom: 6px; }
  .done-sub { font-size: 0.8rem; color: var(--muted); }

  .reset-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  /* ONBOARDING */
  .ob-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 48px 24px 40px;
    z-index: 100;
  }

  .ob-step {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 40px;
  }

  .ob-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
  }

  .ob-title span { color: var(--accent); }

  .ob-sub {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .ob-body { flex: 1; overflow-y: auto; }

  .ob-name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    padding: 8px 0;
    outline: none;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .ob-name-input:focus { border-bottom-color: var(--accent); }
  .ob-name-input::placeholder { color: var(--border); }

  .ob-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ob-option {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .ob-option.selected {
    border-color: var(--accent);
    background: #0f1f00;
  }

  .ob-option-icon { margin-bottom: 10px; color: #888; line-height: 1; }
  .ob-option.selected .ob-option-icon { color: var(--accent); }
  .ob-option:active { transform: scale(0.97); }

  .sc-icon { color: var(--accent); flex-shrink: 0; line-height: 1; }
  .extra-icon { color: var(--accent); margin-bottom: 8px; line-height: 1; }

  .plan-scenario-header { align-items: center; }
  .extra-btn { display: flex; flex-direction: column; }

  i[class^="ph"] { display: inline-flex; align-items: center; justify-content: center; }

  .ob-option-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    min-height: calc(2 * 0.65rem * 1.4);
  }

  .ob-option.selected .ob-option-name { color: var(--accent); }

  .ob-option-desc {
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .ob-time-list { display: flex; flex-direction: column; gap: 14px; }

  .ob-time-opt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
    text-align: left;
  }

  .ob-time-opt:active { transform: scale(0.98); }
  .ob-time-opt.selected { border-color: var(--accent); }

  .ob-time-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
    flex-shrink: 0;
    min-width: 52px;
  }

  .ob-time-right { display: flex; flex-direction: column; gap: 2px; }
  .ob-time-unit { font-family: 'Unbounded', sans-serif; font-size: 0.6rem; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; }
  .ob-time-opt.selected .ob-time-unit { color: var(--accent); }
  .ob-time-label { font-size: 0.78rem; color: var(--muted); }

  .ob-footer { padding-top: 24px; }

  /* ── ACTIVE WORKOUT ── */
  .wo-screen {
    display: flex; flex-direction: column;
    min-height: calc(100vh - 80px);
  }
  .wo-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .wo-exit {
    background: none; border: none; color: var(--muted);
    font-size: 1.1rem; cursor: pointer; padding: 4px; line-height: 1;
  }
  .wo-counter {
    font-family: 'Unbounded', sans-serif; font-size: 0.6rem;
    font-weight: 700; color: var(--muted); letter-spacing: 0.05em;
  }
  .wo-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 36px; }
  .wo-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .wo-section-tag {
    font-size: 0.5rem; color: var(--muted); font-family: 'Unbounded', sans-serif;
    letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .wo-name {
    font-family: 'Unbounded', sans-serif; font-size: 1.25rem;
    font-weight: 900; line-height: 1.2; margin-bottom: 8px;
  }
  .wo-set-label { color: var(--muted); font-size: 0.82rem; margin-bottom: 36px; }
  .wo-target { text-align: center; margin-bottom: 36px; }
  .wo-big-num {
    font-family: 'Unbounded', sans-serif; font-size: 5rem;
    font-weight: 900; color: var(--accent); line-height: 1;
  }
  .wo-big-unit {
    font-family: 'Unbounded', sans-serif; font-size: 0.65rem;
    color: var(--muted); letter-spacing: 0.1em; margin-top: 6px;
  }
  .wo-hint-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; color: var(--muted);
    font-size: 0.82rem; cursor: pointer; padding: 0; margin-bottom: 14px;
  }
  .wo-hint-body {
    background: var(--card); border-radius: 14px;
    padding: 16px; margin-bottom: 16px;
  }
  .wo-hint-body ol { padding-left: 18px; color: var(--muted); font-size: 0.85rem; line-height: 1.7; }
  .wo-warn { color: #f0a500; font-size: 0.8rem; margin-top: 10px; }
  .wo-footer { margin-top: auto; padding-top: 16px; }
  .wo-start-btn {
    width: 100%; padding: 22px;
    background: var(--accent); border: none; border-radius: 16px;
    color: #000; font-family: 'Unbounded', sans-serif;
    font-size: 0.9rem; font-weight: 900; letter-spacing: 0.06em; cursor: pointer;
    transition: transform 0.1s;
  }
  .wo-start-btn:active { transform: scale(0.97); }
  .wo-done-btn {
    width: 100%; padding: 22px;
    background: transparent; border: 2px solid var(--accent);
    border-radius: 16px; color: var(--accent);
    font-family: 'Unbounded', sans-serif; font-size: 0.9rem;
    font-weight: 900; letter-spacing: 0.06em; cursor: pointer;
  }
  .wo-result-q {
    font-family: 'Unbounded', sans-serif; font-size: 0.6rem;
    color: var(--muted); letter-spacing: 0.08em; text-align: center; margin-bottom: 16px;
  }
  .wo-result-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .wo-result-chip {
    padding: 12px 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .wo-result-chip.target { border-color: var(--accent); color: var(--accent); }
  .wo-custom-row { display: flex; gap: 8px; justify-content: center; margin-top: 4px; }
  .wo-custom-input {
    width: 100px; padding: 10px 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem; font-weight: 700; text-align: center;
    -moz-appearance: textfield;
  }
  .wo-custom-input::-webkit-outer-spin-button,
  .wo-custom-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .wo-custom-input:focus { outline: none; border-color: var(--accent); }
  .wo-custom-btn {
    padding: 10px 20px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--muted); font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem; font-weight: 700; cursor: pointer;
    transition: all 0.15s;
  }
  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer; margin-bottom: 24px;
  }
  .wo-back-btn {
    flex: 1; padding: 14px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer; margin-top: 10px;
  }
  .wo-skip-btn {
    flex: 1; padding: 14px; background: transparent;
    border: 1px solid #222; border-radius: 12px;
    color: var(--muted); font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.04em;
    cursor: pointer; margin-top: 10px;
  }
  .extra-section { margin-top: 28px; }
  .extra-label {
    font-family: 'Unbounded', sans-serif; font-size: 0.52rem;
    color: var(--muted); letter-spacing: 0.1em; margin-bottom: 12px;
  }
  .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .extra-btn {

function parseMeta(meta) {
  // extract main value: "3 × 12", "~20", "10" etc.
  const setsMatch = meta.match(/(\d+)\s*[×x]\s*(\d+)/);
  const numMatch = meta.match(/~?(\d+)/);

  let val, unit;
  if (setsMatch) {
    val = `${setsMatch[1]}×${setsMatch[2]}`;
    if (/сек/.test(meta)) unit = 'сек';
    else if (/мин/.test(meta)) unit = 'мин';
    else unit = 'повт.';
  } else if (numMatch) {
    val = numMatch[0];
    if (/мин/.test(meta)) unit = 'мин';
    else if (/сек/.test(meta)) unit = 'сек';
    else unit = 'подх.';
  } else {
    val = '—'; unit = '';
  }
  return { val, unit };
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = (seed >>> 0) || 1;
  for (let i = a.length - 1; i > 0; i--) {
    s = Math.imul(s ^ s >>> 17, s | 0xd) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getWeekSeed() {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() * 53 + week;
}

function canDoExercise(ex, equipment) {
  return ex.equipment.length === 0 || ex.equipment.every(e => equipment.includes(e));
}

function pickExercises(targetMuscles, profile, count, seed) {
  const owned = profile.equipment || [];
  const isWoman = profile.gender === 'female';
  let pool = EXERCISE_DB.filter(ex => {
    if (!canDoExercise(ex, owned)) return false;
    if (ex.muscles.every(m => m === 'warmup')) return false;
    return ex.muscles.some(m => targetMuscles.includes(m));
  });
  if (isWoman) {
    const pref = pool.filter(ex => ex.muscles.some(m => ['glutes','hamstrings','core','stretch'].includes(m)));
    const rest = pool.filter(ex => !ex.muscles.some(m => ['glutes','hamstrings','core','stretch'].includes(m)));
    pool = [...seededShuffle(pref, seed), ...seededShuffle(rest, seed + 1)];
  } else {
    pool = seededShuffle(pool, seed);
  }
  return pool.slice(0, count).map(ex => ({ id: ex.id, sets: ex.defaultSets, reps: ex.defaultReps, timed: !!ex.timed }));
}

function pickWarmupExercises(count, profile, seed) {
  const owned = profile.equipment || [];
  const pool = EXERCISE_DB.filter(ex => ex.muscles.includes('warmup') && canDoExercise(ex, owned));
  return seededShuffle(pool, seed).slice(0, count);
}

function generateWeekPlan(profile) {
  const DAYS = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
  const pattern = [true, true, false, true, true, false, false];
  const REST_NOTES = [
    'Активный отдых. Погуляй, подыши.',
    'День отдыха. Мышцы растут в покое.',
    'Полный отдых. Неделя почти сделана.',
  ];
  const seed = getWeekSeed();
  const goalIds = profile.goals || ['force'];
  let splits = GOAL_SPLITS[goalIds[0]] || GOAL_SPLITS.force;
  if (goalIds.length > 1) {
    const sec = GOAL_SPLITS[goalIds[1]];
    if (sec) splits = [splits[0], sec[0], splits[1], sec[1] || splits[2]];
  }
  const exCount = profile.time === 45 ? 7 : profile.time === 30 ? 5 : 4;
  let splitIdx = 0, restIdx = 0;
  return DAYS.map((label, i) => {
    if (!pattern[i]) {
      return { label, name: 'Отдых', rest: true, restNote: REST_NOTES[restIdx++ % REST_NOTES.length] };
    }
    const split = splits[splitIdx % splits.length];
    const exercises = pickExercises(split.muscles, profile, exCount, seed + i * 17);
    splitIdx++;
    return { label, name: split.name, muscles: split.muscles, exercises };
  });
}

})();

  if (!userProfile) {

  state.screen = 'workout';
  document.querySelector('.app-header').style.display = '';

}

// ─── KEYS ────────────────────────────────────────────────

function exKey(context, scenarioId, secIdx, exIdx) {
  return `${context}_${scenarioId}_${secIdx}_${exIdx}`;
}

function getProgress(context, scenarioId) {
  const sc = SCENARIOS[scenarioId];
  if (!sc) return { total: 0, done: 0 };
  let total = 0, done = 0;
  sc.sections.forEach((sec, si) => {
    sec.exercises.forEach((ex, ei) => {
      total++;
      if (checked[exKey(context, scenarioId, si, ei)]) done++;
    });
  });
  return { total, done };
}

function getDayProgress(dayIdx) {
  const day = WEEK_PLAN[dayIdx];
  if (day.rest || !day.exercises) return { total: 0, done: 0 };
  const total = day.exercises.length;
  let done = 0;
  day.exercises.forEach(ex => { if (checked[`d${dayIdx}_${ex.id}`]) done++; });
  return { total, done };
}

// ─── ACTIONS ─────────────────────────────────────────────

function toggleEx(secIdx, exIdx) {
  const k = exKey(state.activeContext, state.activeScenario, secIdx, exIdx);
  checked[k] = !checked[k];
  save();
  render();
}

function toggleHint(id) {
  const body = document.getElementById('h-' + id);
  const arrow = document.getElementById('a-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

function openScenario(scenarioId, context) {
  state.activeScenario = scenarioId;
  state.activeContext = context;
  state.view = 'workout';
  render();
}

function openExtra(scenarioId) {
  openScenario(scenarioId, 'extra_' + state.dayIdx + '_' + scenarioId);
}

function openPlanScenario(scenarioId) {
  openScenario(scenarioId, 'plan_' + state.dayIdx);
}

function goBack() {
  state.view = 'home';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function switchDay(idx) {
  state.dayIdx = idx;
  state.view = 'day';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function resetCurrent() {
  if (!state.activeScenario || !state.activeContext) return;
  Object.keys(checked).forEach(k => {
    if (k.startsWith(state.activeContext + '_' + state.activeScenario)) delete checked[k];
  });
  save();
  render();
}

function renderTabs() {
  return `<div class="day-tabs">
    ${WEEK_PLAN.map((d, i) => {
      const isToday = i === todayIdx;
      const { total, done } = getDayProgress(i);
      const allDone = total > 0 && done === total;
      return `<button class="tab ${d.rest ? 'rest-tab' : ''} ${i === state.dayIdx ? 'active' : ''} ${isToday ? 'today-tab' : ''}"
        onclick="switchDay(${i})">${d.label}${allDone ? ' ✓' : ''}</button>`;
    }).join('')}
  </div>`;
}

function renderDayView() {
  const day = WEEK_PLAN[state.dayIdx];

  let html = renderTabs();

  html += `<div class="day-header">
    <div>
      <div class="day-title">${day.name}</div>
      ${state.dayIdx === todayIdx ? '<div class="day-subtitle">сегодня</div>' : ''}

  if (day.rest) {
    html += `<div class="rest-card">

      <div class="rest-title">День отдыха</div>
      <div class="rest-text">${day.restNote}</div>
    </div>`;
  } else {
    // Plan scenarios
    html += `<div class="plan-label">план дня</div>`;
    day.scenarios.forEach(scId => {
      const sc = SCENARIOS[scId];
      const ctx = 'plan_' + state.dayIdx;
      const { total, done } = getProgress(ctx, scId);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const allDone = done === total && total > 0;
      html += `
        <div class="plan-scenario ${allDone ? 'completed' : ''}">
          <div class="plan-scenario-header" onclick="openPlanScenario('${scId}')">
            <div class="sc-icon">${icon(sc.icon)}</div>

          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  // Extra section — all scenarios
  html += `<div class="divider"><div class="divider-line"></div><div class="divider-text">ЕЩЁ / ПО НАСТРОЕНИЮ</div><div class="divider-line"></div></div>`;
  html += `<div class="extra-grid">`;
  Object.values(SCENARIOS).forEach(sc => {
    const ctx = 'extra_' + state.dayIdx + '_' + sc.id;

    const hasDone = done > 0;
    html += `
      <button class="extra-btn ${hasDone ? 'has-done' : ''}" onclick="openExtra('${sc.id}')">
        <div class="extra-icon">${icon(sc.icon)}</div>

        <div class="extra-time">${sc.time}</div>
      </button>

  });
  html += `</div>`;

  return html;
}

function renderWorkoutView() {
  const sc = SCENARIOS[state.activeScenario];
  if (!sc) return renderDayView();

  const { total, done } = getProgress(state.activeContext, state.activeScenario);
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const allDone = done === total && total > 0;

  let html = `<div class="back-btn" onclick="goBack()">← назад</div>`;
  html += `<div class="progress-row"><span style="display:flex;align-items:center;gap:6px">${icon(sc.icon, 16)} ${sc.name}</span><span style="color:var(--accent)">${done}/${total}</span></div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if (allDone) {
    html += `<div class="done-screen">
      <div class="done-emoji" style="color:var(--accent)">${icon('check-fat', 52)}</div>
      <div class="done-title">Сделано!</div>
      <div class="done-sub">Хорошая работа. Тело скажет спасибо.</div>

  }

  sc.sections.forEach((sec, si) => {
    html += `<div class="section-label">${sec.title}</div>`;
    sec.exercises.forEach((ex, ei) => {
      const isDone = !!checked[exKey(state.activeContext, state.activeScenario, si, ei)];

      const tags = ex.tags.map(t => `<span class="tag ${TAGS[t].cls}">${TAGS[t].label}</span>`).join('');

      html += `

  html += `<button class="reset-btn" onclick="resetCurrent()">↺ СБРОСИТЬ</button>`;

// ─── WORKOUT SESSION ─────────────────────────────────────

let workoutSession = null;

function getTotalPoints() {
  let pts = 0;
  for (let i = 0; i < 7; i++) {
    const { done } = getDayProgress(i);
    pts += done * 10;
  }
  return pts;
}

function getWeekWorkoutCount() {
  let done = 0, total = 0;
  WEEK_PLAN.forEach((d, i) => {
    if (d.rest || !d.scenarios) return;
    total++;
    const { done: dn } = getDayProgress(i);
    if (dn > 0) done++;
  });
  return { done, total };
}

function getScenarioExercises(scId) {
  const sc = SCENARIOS[scId];
  if (!sc) return [];
  const list = [];
  sc.sections.forEach(sec => sec.exercises.forEach(ex => list.push({ ...ex, scenarioName: sc.name, section: sec.title })));
  return list;
}

function startScenario(scId) {
  const exercises = getScenarioExercises(scId);
  if (!exercises.length) return;
  if (workoutSession?.timerInterval) clearInterval(workoutSession.timerInterval);
  workoutSession = {
    exercises, exerciseIdx: 0, setIdx: 0,
    phase: 'ready', timerSeconds: 0,
    timerInterval: null, hintOpen: false,
    results: [], startTime: Date.now(),
  };
  state.view = 'active_workout';
  document.querySelector('.app-header').style.display = 'none';
  render();
}

function wsBack() {
  const ws = workoutSession;
  if (ws.timerInterval) { clearInterval(ws.timerInterval); ws.timerInterval = null; }
  if (ws.phase === 'result') { ws.phase = 'ready'; ws.timerSeconds = 0; render(); return; }
  if (ws.setIdx > 0) {
    ws.setIdx--; ws.results.pop();
  } else if (ws.exerciseIdx > 0) {
    ws.exerciseIdx--;
    const prevDet = parseExDetail(ws.exercises[ws.exerciseIdx].meta);
    ws.setIdx = prevDet.sets - 1;
    ws.results.pop();
    ws.hintOpen = false;
  } else { return; }
  ws.phase = 'ready'; ws.timerSeconds = 0;
  render();
}

function wsSkip() {
  const ws = workoutSession;
  if (ws.timerInterval) { clearInterval(ws.timerInterval); ws.timerInterval = null; }
  const det = parseExDetail(ws.exercises[ws.exerciseIdx].meta);
  const setsLeft = det.sets - ws.setIdx;
  for (let i = 0; i < setsLeft; i++) ws.results.push({ exerciseIdx: ws.exerciseIdx, setIdx: ws.setIdx + i, reps: 0, skipped: true });
  if (ws.exerciseIdx < ws.exercises.length - 1) {
    ws.exerciseIdx++; ws.setIdx = 0; ws.phase = 'ready'; ws.timerSeconds = 0; ws.hintOpen = false;
  } else {
    ws.phase = 'complete';
  }
  render();
}

function getWorkoutExercises() {
  const day = WEEK_PLAN[state.dayIdx];
  if (!day.exercises) return [];
  return day.exercises.map(ex => {
    const dbEx = EXERCISE_DB.find(e => e.id === ex.id);
    if (!dbEx) return null;
    const meta = ex.timed ? `${ex.sets} × ${ex.reps} сек` : `${ex.sets} × ${ex.reps}`;
    return { name: dbEx.name, meta, section: day.name, hint: dbEx.hint || [], _exId: ex.id };
  }).filter(Boolean);
}

function parseExDetail(meta) {
  const srTime = meta.match(/(\d+)\s*[×x]\s*(\d+)\s*(сек|мин)/);
  if (srTime) return { sets: +srTime[1], seconds: srTime[3]==='мин' ? +srTime[2]*60 : +srTime[2], type: 'time' };
  const sr = meta.match(/(\d+)\s*[×x]\s*(\d+)/);
  const tm = meta.match(/(\d+)\s*(сек|мин)/);
  const nm = meta.match(/~?(\d+)/);
  if (sr) return { sets: +sr[1], reps: +sr[2], type: 'reps' };
  if (tm) return { sets: 1, seconds: tm[2]==='мин' ? +tm[1]*60 : +tm[1], type: 'time' };
  if (nm) return { sets: 1, reps: +nm[1], type: 'reps' };
  return { sets: 1, reps: 10, type: 'reps' };
}

function startWorkout() {
  const day = WEEK_PLAN[state.dayIdx];
  let exercises = getWorkoutExercises();
  let exerciseIds = day.exercises?.map(ex => ex.id) || [];
  if (state.withWarmup) {
    const seed = getWeekSeed() + state.dayIdx * 7;
    const wu = pickWarmupExercises(3, userProfile, seed);
    const wuEx = wu.map(ex => ({ name: ex.name, meta: ex.timed ? `1 × ${ex.defaultReps} сек` : `2 × ${ex.defaultReps}`, section: 'РАЗМИНКА', hint: ex.hint || [] }));
    exercises = [...wuEx, ...exercises];
    exerciseIds = [...wu.map(() => null), ...exerciseIds];
  }
  if (!exercises.length) return;
  launchSession(exercises, exerciseIds, state.dayIdx);
}

function startQuickWorkout(quickId) {
  const q = QUICK_WORKOUTS.find(x => x.id === quickId);
  if (!q) return;
  const seed = getWeekSeed() + quickId.length;
  const picked = pickExercises(q.muscles, userProfile, q.exCount, seed);
  const exercises = picked.map(ex => {
    const dbEx = EXERCISE_DB.find(e => e.id === ex.id);
    if (!dbEx) return null;
    const meta = ex.timed ? `${ex.sets} × ${ex.reps} сек` : `${ex.sets} × ${ex.reps}`;
    return { name: dbEx.name, meta, section: q.name, hint: dbEx.hint || [] };
  }).filter(Boolean);
  launchSession(exercises, exercises.map(() => null), null);
}

function launchSession(exercises, exerciseIds, dayIdx) {
  if (workoutSession?.timerInterval) clearInterval(workoutSession.timerInterval);
  workoutSession = {
    exercises, exerciseIds, dayIdx,
    exerciseIdx: 0, setIdx: 0,
    phase: 'ready', timerSeconds: 0,
    timerInterval: null, hintOpen: false,
    results: [], startTime: Date.now(),
  };
  state.view = 'active_workout';
  document.querySelector('.app-header').style.display = 'none';
  render();
}

function wsBegin() {
  const det = parseExDetail(workoutSession.exercises[workoutSession.exerciseIdx].meta);
  workoutSession.phase = 'active';
  workoutSession.timerSeconds = det.type === 'time' ? det.seconds : 0;
  workoutSession.timerInterval = setInterval(() => {
    if (det.type === 'time') {
      workoutSession.timerSeconds--;
      if (workoutSession.timerSeconds <= 0) {
        clearInterval(workoutSession.timerInterval);
        workoutSession.timerInterval = null;
        wsFinishSet(det.seconds);
        return;
      }
    } else {
      workoutSession.timerSeconds++;
    }
    const app = document.getElementById('app');
    if (app) app.innerHTML = buildActiveWorkout();
  }, 1000);
  render();
}

function wsDone() {
  const det = parseExDetail(workoutSession.exercises[workoutSession.exerciseIdx].meta);
  if (workoutSession.timerInterval) { clearInterval(workoutSession.timerInterval); workoutSession.timerInterval = null; }
  if (det.type === 'time') { wsFinishSet(det.seconds); return; }
  workoutSession.phase = 'result';
  workoutSession._det = det;
  render();
}

function wsFinishSet(reps) {
  const ws = workoutSession;
  ws.results.push({ exerciseIdx: ws.exerciseIdx, setIdx: ws.setIdx, reps });
  const det = parseExDetail(ws.exercises[ws.exerciseIdx].meta);
  if (ws.setIdx < det.sets - 1) {
    ws.setIdx++; ws.phase = 'ready'; ws.timerSeconds = 0;
  } else {
    const exId = ws.exerciseIds?.[ws.exerciseIdx];
    if (exId && ws.dayIdx !== null && ws.dayIdx !== undefined) {
      checked[`d${ws.dayIdx}_${exId}`] = true; save();
    }
    if (ws.exerciseIdx < ws.exercises.length - 1) {
      ws.exerciseIdx++; ws.setIdx = 0; ws.phase = 'ready'; ws.timerSeconds = 0; ws.hintOpen = false;
    } else {
      ws.phase = 'complete';
    }
  }
  render();
}

function wsExit() {
  if (workoutSession?.timerInterval) clearInterval(workoutSession.timerInterval);
  workoutSession = null;
  state.view = 'home';
  document.querySelector('.app-header').style.display = '';
  render();
}

function buildActiveWorkout() {
  const ws = workoutSession;
  if (ws.phase === 'complete') {
    const mins = Math.round((Date.now() - ws.startTime) / 60000);
    return `<div class="wo-complete">
      <div style="color:var(--accent);margin-bottom:24px">${icon('check-fat', 64)}</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:1.5rem;font-weight:900;margin-bottom:8px">ГОТОВО!</div>
      <div style="color:var(--muted);font-size:0.85rem;margin-bottom:40px">${ws.exercises.length} упражнений · ${mins || 1} мин</div>
      <button class="wo-start-btn" style="max-width:280px" onclick="wsExit()">ЗАВЕРШИТЬ</button>
    </div>`;
  }

  const ex = ws.exercises[ws.exerciseIdx];
  const det = parseExDetail(ex.meta);
  const pct = Math.round((ws.exerciseIdx / ws.exercises.length) * 100);
  const m = Math.floor(Math.abs(ws.timerSeconds)/60);
  const s = Math.abs(ws.timerSeconds)%60;
  const timeStr = `${m}:${s.toString().padStart(2,'0')}`;

  let bigNum = '', bigUnit = '';
  if (ws.phase === 'ready') {
    if (det.type === 'time') {
      const tm = Math.floor(det.seconds/60), ts = det.seconds%60;
      bigNum = tm > 0 ? `${tm}:${ts.toString().padStart(2,'0')}` : det.seconds;
      bigUnit = 'секунд';
    } else { bigNum = det.reps; bigUnit = 'повторений'; }
  } else if (ws.phase === 'active') {
    bigNum = timeStr;
    bigUnit = det.type === 'time' ? 'осталось' : 'прошло';
  }

  let targetBlock = '';
  if (ws.phase === 'result') {
    const target = det.reps || 10;
    const opts = [];
    for (let i = Math.max(1, target-3); i <= target+3; i++) opts.push(i);
    targetBlock = `
      <div class="wo-target">
        <div class="wo-result-q">СКОЛЬКО СДЕЛАЛ?</div>
        <div class="wo-result-row">
          ${opts.map(n=>`<button class="wo-result-chip ${n===target?'target':''}" onclick="wsFinishSet(${n})">${n}</button>`).join('')}
        </div>
        <div class="wo-custom-row">
          <input type="number" id="wo-custom-reps" class="wo-custom-input" placeholder="другое" min="0" max="999">
          <button class="wo-custom-btn" onclick="const v=+document.getElementById('wo-custom-reps').value;if(v>0)wsFinishSet(v)">ОК</button>
        </div>
      </div>`;
  } else {
    targetBlock = `<div class="wo-target">
      <div class="wo-big-num">${bigNum}</div>
      <div class="wo-big-unit">${bigUnit}</div>
    </div>`;
  }

  const hint = ex.hint ? `
    <button class="wo-hint-btn" onclick="workoutSession.hintOpen=!workoutSession.hintOpen;document.getElementById('app').innerHTML=buildActiveWorkout()">
      ${icon(ws.hintOpen?'caret-up':'caret-down', 14)} Как делать
    </button>
    ${ws.hintOpen ? `<div class="wo-hint-body"><ol>${ex.hint.map(h=>`<li>${h}</li>`).join('')}</ol>${ex.warn?`<div class="wo-warn">⚠ ${ex.warn}</div>`:''}</div>` : ''}
  ` : '';

  const canGoBack = ws.exerciseIdx > 0 || ws.setIdx > 0 || ws.phase === 'result';

  let footerBtn = '';
  if (ws.phase === 'ready') footerBtn = `<button class="wo-start-btn" onclick="wsBegin()">НАЧАЛИ!</button>`;
  else if (ws.phase === 'active') footerBtn = `<button class="wo-done-btn" onclick="wsDone()">ГОТОВО</button>`;

  return `<div class="wo-screen">
    <div class="wo-top">
      <button class="wo-exit" onclick="wsExit()">${icon('x', 20)}</button>
      <div class="wo-counter">${ws.exerciseIdx+1} / ${ws.exercises.length}</div>
    </div>
    <div class="wo-bar"><div class="wo-bar-fill" style="width:${pct}%"></div></div>
    <div class="wo-section-tag">${ex.section}</div>
    <div class="wo-name">${ex.name}</div>
    <div class="wo-set-label">Подход ${ws.setIdx+1} из ${det.sets}</div>
    ${targetBlock}
    ${hint}
    <div class="wo-footer">
      ${footerBtn}
      <div style="display:flex;gap:8px">
        ${canGoBack ? `<button class="wo-back-btn" onclick="wsBack()">← НАЗАД</button>` : ''}
        ${ws.phase !== 'complete' ? `<button class="wo-skip-btn" onclick="wsSkip()">ПРОПУСТИТЬ</button>` : ''}
      </div>
    </div>
  </div>`;
}

function renderActiveWorkout() { return buildActiveWorkout(); }

function renderExerciseDB() {
  const { filterMuscles, filterEquips, openId } = exDbState;

  const muscleChips = MUSCLE_GROUPS.map(m => {
    const active = filterMuscles.includes(m.id);
    return `<button class="ex-chip ${active ? 'ex-chip-on' : ''}" onclick="exDbFilter('muscle','${m.id}')">${m.name}</button>`;
  }).join('');

  const equipChips = EQUIPMENT.map(e => {
    const active = filterEquips.includes(e.id);
    return `<button class="ex-chip ${active ? 'ex-chip-on' : ''}" onclick="exDbFilter('equip','${e.id}')">${e.label}</button>`;
  }).join('');

  let list = EXERCISE_DB;
  if (filterMuscles.length) list = list.filter(e => filterMuscles.some(m => e.muscles.includes(m)));
  if (filterEquips.length) list = list.filter(e => e.equipment.length === 0 || filterEquips.some(eq => e.equipment.includes(eq)));

  const typeLabel = { strength: 'сила', cardio: 'кардио', stretch: 'растяжка' };
  const diffDots = d => '●'.repeat(d) + '○'.repeat(3-d);

  const cards = list.map(ex => {
    const isOpen = openId === ex.id;
    const muscleNames = ex.muscles.slice(0,3).map(mid => MUSCLE_GROUPS.find(m=>m.id===mid)?.name || mid).join(', ');
    const equipNames = ex.equipment.length ? ex.equipment.map(eid => EQUIPMENT.find(e=>e.id===eid)?.label || eid).join(', ') : 'без инвентаря';

    let detail = '';
    if (isOpen) {
      const sets = exDbState.customSets;
      const reps = exDbState.customReps;
      const hints = (ex.hint || []).map((h,i) => `<div class="ex-hint-step"><span class="ex-hint-num">${i+1}</span>${h}</div>`).join('');
      const warn = ex.warn ? `<div class="ex-warn">${ex.warn}</div>` : '';
      detail = `
        <div class="ex-detail">
          <div class="ex-detail-row"><span class="ex-detail-label">Мышцы</span><span>${muscleNames}</span></div>
          <div class="ex-detail-row"><span class="ex-detail-label">Инвентарь</span><span>${equipNames}</span></div>
          ${hints ? `<div class="ex-hints">${hints}</div>` : ''}
          ${warn}
          <div class="ex-start-row">
            <div class="ex-picker">
              <button class="ex-pick-btn" onclick="event.stopPropagation();exDbAdjust('sets',-1)">−</button>
              <span class="ex-pick-val">${sets} подходов</span>
              <button class="ex-pick-btn" onclick="event.stopPropagation();exDbAdjust('sets',1)">+</button>
            </div>
            <div class="ex-picker">
              <button class="ex-pick-btn" onclick="event.stopPropagation();exDbAdjust('reps',-1)">−</button>
              <span class="ex-pick-val">${reps} ${ex.timed ? 'секунд' : 'повторений'}</span>
              <button class="ex-pick-btn" onclick="event.stopPropagation();exDbAdjust('reps',1)">+</button>
            </div>
            <button class="ex-go-btn" onclick="event.stopPropagation();startSingleExercise('${ex.id}',${sets},${reps})">ВЫПОЛНИТЬ</button>
          </div>
        </div>`;
    }

    return `<div class="ex-card" onclick="exDbOpen('${ex.id}')">
      <div class="ex-card-top">
        <div class="ex-card-name">${ex.name}</div>
        <div class="ex-card-meta">
          <span class="ex-type-tag ex-type-${ex.type}">${typeLabel[ex.type]||ex.type}</span>
          <span class="ex-diff">${diffDots(ex.difficulty)}</span>
        </div>
      </div>
      ${!isOpen ? `<div class="ex-card-sub">${muscleNames}</div>` : ''}
      ${detail}
    </div>`;
  }).join('');

  const noResults = list.length === 0 ? `<div style="color:var(--muted);text-align:center;padding:40px 0">Нет упражнений</div>` : '';

  return `<div>
    <div class="ex-filters">
      <div class="ex-chips-scroll">${muscleChips}</div>
      <div class="ex-chips-scroll" style="margin-top:8px">${equipChips}</div>
      ${(filterMuscles.length||filterEquips.length) ? `<button class="ex-reset" onclick="exDbReset()">× сбросить фильтр</button>` : ''}
    </div>
    <div class="ex-count">${list.length} упражнений</div>
    <div class="ex-list">${cards}${noResults}</div>
  </div>${renderBottomNav()}`;
}

function exDbFilter(type, val) {
  const arr = type === 'muscle' ? exDbState.filterMuscles : exDbState.filterEquips;
  const idx = arr.indexOf(val);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(val);
  exDbState.openId = null;
  render();
}

function exDbOpen(id) {
  exDbState.openId = exDbState.openId === id ? null : id;
  const ex = EXERCISE_DB.find(e => e.id === id);
  if (ex) { exDbState.customSets = ex.defaultSets; exDbState.customReps = ex.defaultReps; }
  render();
}

function exDbAdjust(field, delta) {
  if (field === 'sets') exDbState.customSets = Math.max(1, Math.min(10, exDbState.customSets + delta));
  else exDbState.customReps = Math.max(1, Math.min(120, exDbState.customReps + delta));
  render();
}

function exDbReset() { exDbState.filterMuscles = []; exDbState.filterEquips = []; exDbState.openId = null; render(); }

function startSingleExercise(exId, sets, reps) {
  const ex = EXERCISE_DB.find(e => e.id === exId);
  if (!ex) return;
  const meta = ex.timed ? `${sets} × ${reps} сек` : `${sets} × ${reps}`;
  const sessionExercises = [{ name: ex.name, meta, section: 'упражнение', hint: ex.hint || [] }];
  workoutSession = { exercises: sessionExercises, exIdx: 0, setIdx: 0, phase: 'ready', customReps: null };
  state.view = 'active_workout';
  render();
}

const SCREEN_TITLES = {
  workout:      { title: 'LAZYLESS',    sub: 'домашние тренировки' },
  profile:      { title: 'ПРОФИЛЬ',     sub: '' },
  exercises:    { title: 'БАЗА УПРАЖНЕНИЙ',  sub: '' },
  achievements: { title: 'УСПЕХИ',      sub: '' },
};

const FIELD_TITLES = { name: 'ИМЯ', gender_age: 'ПОЛ И ВОЗРАСТ', goals: 'ЦЕЛИ', time: 'ВРЕМЯ', equipment: 'ИНВЕНТАРЬ' };

function setHeader(screen) {
  let title, sub;
  if (screen === 'profile' && profileEditField) {
    title = FIELD_TITLES[profileEditField] || 'ПРОФИЛЬ'; sub = '';
  } else {
    const t = SCREEN_TITLES[screen] || SCREEN_TITLES.workout;
    title = t.title; sub = t.sub;
  }
  document.getElementById('hdr-title').textContent = title;
  document.getElementById('hdr-sub').textContent = sub;
  const hdrRight = document.getElementById('hdr-right');
  if (screen === 'workout') {
    const pts = getTotalPoints();
    const wk = getWeekWorkoutCount();
    document.getElementById('hdr-points').textContent = `⚡ ${pts}`;
    document.getElementById('hdr-week').textContent = `${wk.done} из ${wk.total} тренировок`;
    hdrRight.style.display = '';
  } else {
    hdrRight.style.display = 'none';
  }
}

function render() {
  const app = document.getElementById('app');
  setHeader(state.screen);
  switch (state.screen) {
    case 'profile':      app.innerHTML = renderProfile(); break;
    case 'exercises':    app.innerHTML = renderExerciseDB(); break;
    case 'achievements': app.innerHTML = renderPlaceholder('Успехи', 'trophy', 'Твои достижения и бейджи появятся здесь'); break;
    default:
      if (state.view === 'active_workout') { app.innerHTML = buildActiveWorkout(); return; }
      else if (state.view === 'plan') app.innerHTML = renderWorkoutPlan();
      else if (state.view === 'workout') app.innerHTML = renderWorkoutView() + renderBottomNav();
      else app.innerHTML = renderWorkoutHome();
  }
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
