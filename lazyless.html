<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazyless — тренировки</title>
<meta name="theme-color" content="#c6ff00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lazyless">
<link rel="manifest" href="manifest.json">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;900&family=Golos+Text:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --accent: #c6ff00;
    --text: #e8e8e8;
    --muted: #555;
    --done-bg: #0f1f00;
    --done-border: #1e3a00;
  }

  .app-header {
    padding: 12px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .app-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
  }

  .app-tagline {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    padding: 20px 16px 80px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .subtitle { color: var(--muted); font-size: 0.75rem; margin-bottom: 20px; }

  /* DAY TABS */
  .day-tabs { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }

  .tab {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.62rem;
    font-weight: 600;
    padding: 12px 4px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
    position: relative;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab.rest-tab { border-color: #1a1a1a; }
  .tab.rest-tab.active { background: #222; color: var(--text); border-color: #333; }
  .tab.today-tab::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* DAY VIEW */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text);
  }

  .day-subtitle { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  /* PLAN SCENARIOS */
  .plan-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .plan-scenario {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .plan-scenario.completed { border-color: var(--done-border); background: var(--done-bg); }

  .plan-scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    cursor: pointer;
  }

  .plan-scenario-header:active { opacity: 0.8; }

  .sc-icon { font-size: 1.3rem; flex-shrink: 0; }

  .sc-info { flex: 1; }

  .sc-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    margin-bottom: 2px;
  }

  .plan-scenario.completed .sc-name { color: var(--accent); }

  .sc-meta { font-size: 0.72rem; color: var(--muted); }

  .sc-progress {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.58rem;
    color: var(--muted);
    flex-shrink: 0;
  }

  .plan-scenario.completed .sc-progress { color: var(--accent); }

  .mini-bar {
    height: 2px;
    background: var(--border);
    margin: 0 14px 12px;
    border-radius: 1px;
    overflow: hidden;
  }

  .mini-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.3s;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 14px;
  }

  .divider-line { flex: 1; height: 1px; background: var(--border); }

  .divider-text {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* EXTRA SCENARIOS */
  .extra-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .extra-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }

  .extra-btn:active { transform: scale(0.97); }
  .extra-btn.has-done { border-color: #2a3a00; }

  .extra-icon { font-size: 1.2rem; margin-bottom: 4px; }

  .extra-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .extra-time { font-size: 0.65rem; color: var(--muted); }

  /* REST DAY */
  .rest-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
  }

  .rest-emoji { font-size: 2.5rem; margin-bottom: 10px; }
  .rest-title { font-family: 'Unbounded', sans-serif; font-size: 0.85rem; margin-bottom: 8px; }
  .rest-text { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

  /* WORKOUT VIEW */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    margin-bottom: 16px;
    letter-spacing: 0.05em;
    min-height: 44px;
  }

  .progress-row {
    display: flex;
    justify-content: space-between;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.6rem;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  .section-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin: 16px 0 8px;
  }

  .ex-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .ex-card.done { background: var(--done-bg); border-color: var(--done-border); }

  .ex-main {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 14px 10px;
    cursor: pointer;
  }

  .ex-main:active { opacity: 0.8; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .ex-card.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; color: #000; font-size: 12px; font-weight: 900; }
  .ex-card.done .check-icon { display: block; }

  .ex-body { flex: 1; }
  .ex-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 3px; }
  .ex-card.done .ex-name { color: var(--accent); }
  .ex-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }

  .tag {
    font-size: 0.58rem;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .t-back, .t-core, .t-chest, .t-endure, .t-wrist,
  .t-feet, .t-pelvis, .t-stretch, .t-force { background: transparent; color: var(--accent); }

  .ex-stat {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: center;
    flex-shrink: 0;
    min-width: 48px;
  }
  .ex-stat-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .ex-card.done .ex-stat-val { opacity: 0.5; }
  .ex-stat-unit {
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
  }

  .hint-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px 10px 48px;
    cursor: pointer;
    font-size: 0.72rem;
    color: var(--muted);
    min-height: 44px;
  }

  .hint-arrow {
    width: 0;
    height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .hint-arrow.open { transform: rotate(90deg); }

  .hint-body {
    display: none;
    padding: 10px 14px 14px 48px;
    font-size: 0.76rem;
    color: #777;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }

  .hint-body.open { display: block; }
  .hint-body ol { padding-left: 16px; }
  .hint-body li { margin-bottom: 4px; }
  .hint-body .warn { color: #ff8800; font-size: 0.7rem; margin-top: 8px; }

  .done-screen { text-align: center; padding: 32px 20px; }
  .done-emoji { font-size: 2.8rem; margin-bottom: 12px; }
  .done-title { font-family: 'Unbounded', sans-serif; font-size: 0.95rem; color: var(--accent); margin-bottom: 6px; }
  .done-sub { font-size: 0.8rem; color: var(--muted); }

  .reset-btn {
    width: 100%;
    margin-top: 14px;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.56rem;
    letter-spacing: 0.1em;
    cursor: pointer;
  }

  /* ONBOARDING */
  .ob-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 48px 24px 40px;
    z-index: 100;
  }

  .ob-step {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-bottom: 40px;
  }

  .ob-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
  }

  .ob-title span { color: var(--accent); }

  .ob-sub {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .ob-body { flex: 1; overflow-y: auto; }

  .ob-name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    padding: 8px 0;
    outline: none;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .ob-name-input:focus { border-bottom-color: var(--accent); }
  .ob-name-input::placeholder { color: var(--border); }

  .ob-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .ob-option {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .ob-option.selected {
    border-color: var(--accent);
    background: #0f1f00;
  }

  .ob-option-icon { margin-bottom: 10px; color: #888; line-height: 1; }
  .ob-option.selected .ob-option-icon { color: var(--accent); }
  .ob-option:active { transform: scale(0.97); }

  .sc-icon { color: var(--accent); flex-shrink: 0; line-height: 1; }
  .extra-icon { color: var(--accent); margin-bottom: 8px; line-height: 1; }

  .plan-scenario-header { align-items: center; }
  .extra-btn { display: flex; flex-direction: column; }

  i[class^="ph"] { display: inline-flex; align-items: center; justify-content: center; }

  .ob-option-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    min-height: calc(2 * 0.65rem * 1.4);
  }

  .ob-option.selected .ob-option-name { color: var(--accent); }

  .ob-option-desc {
    font-size: 0.65rem;
    color: var(--muted);
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .ob-time-list { display: flex; flex-direction: column; gap: 14px; }

  .ob-time-opt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
    text-align: left;
  }

  .ob-time-opt:active { transform: scale(0.98); }
  .ob-time-opt.selected { border-color: var(--accent); }

  .ob-time-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.03em;
    flex-shrink: 0;
    min-width: 52px;
  }

  .ob-time-right { display: flex; flex-direction: column; gap: 2px; }
  .ob-time-unit { font-family: 'Unbounded', sans-serif; font-size: 0.6rem; font-weight: 600; color: var(--muted); letter-spacing: 0.05em; }
  .ob-time-opt.selected .ob-time-unit { color: var(--accent); }
  .ob-time-label { font-size: 0.78rem; color: var(--muted); }

  .ob-footer { padding-top: 24px; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72px;
    background: #0d0d0d;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    z-index: 100;
    overflow: visible;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    height: 100%;
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.4rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    transition: color 0.15s;
    padding: 0;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn.disabled { color: #222; cursor: default; pointer-events: none; }
  .nav-btn-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: none;
    border: none;
    cursor: pointer;
  }
  .nav-center-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #000;
    box-shadow: 0 0 18px rgba(198,255,0,0.25);
    transition: transform 0.15s;
  }
  .nav-btn-center:active .nav-center-circle { transform: scale(0.92); }
  .nav-btn-center:active .nav-center-circle {
    transform: scale(0.92);
    box-shadow: 0 0 12px rgba(198,255,0,0.2);
  }
  .nav-center-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.4rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: #444;
  }

  /* ── PROFILE ── */
  .profile-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--card);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
    margin: 0 auto 20px;
    flex-shrink: 0;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-edit {
    position: absolute; bottom: 0; right: 0;
    background: var(--accent); color: #000;
    border-radius: 50%;
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .profile-section {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.55rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin: 28px 0 12px;
  }
  .profile-field {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    color: var(--text);
    font-size: 1rem;
    font-family: 'Golos Text', sans-serif;
    outline: none;
  }
  .profile-field:focus { border-color: var(--accent); }
  .gender-row { display: flex; gap: 10px; }
  .gender-pill {
    flex: 1;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Unbounded', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .gender-pill.selected { border-color: var(--accent); color: var(--accent); background: #0f1f00; }
  .equip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .equip-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    font-size: 0.78rem;
    font-family: 'Golos Text', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .equip-pill.selected { border-color: var(--accent); color: var(--accent); background: #0f1f00; }
  .save-btn {
    width: 100%;
    margin-top: 32px;
    padding: 18px;
    background: var(--accent);
    border: none; border-radius: 14px;
    color: #000;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    cursor: pointer;
    margin-bottom: 16px;
  }

  .ob-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    color: #000;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .ob-btn:disabled {
    background: var(--card);
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: default;
  }

  .ob-welcome-logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.04em;
    margin-bottom: 4px;
  }

  .ob-welcome-tag { font-size: 0.78rem; color: var(--muted); margin-bottom: 60px; }

  .ob-ready-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .ob-ready-text { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">LAZYLESS</div>
  <div class="app-tagline">домашние тренировки</div>
</div>

<div id="app"></div>

<script>
function icon(name, size = 24) {
  return `<i class="ph-bold ph-${name}" style="font-size:${size}px"></i>`;
}

// ─── META FORMAT ─────────────────────────────────────────

function parseMeta(meta) {
  // extract main value: "3 × 12", "~20", "10" etc.
  const setsMatch = meta.match(/(\d+)\s*[×x]\s*(\d+)/);
  const numMatch = meta.match(/~?(\d+)/);

  let val, unit;
  if (setsMatch) {
    val = `${setsMatch[1]}×${setsMatch[2]}`;
    if (/сек/.test(meta)) unit = 'сек';
    else if (/мин/.test(meta)) unit = 'мин';
    else unit = 'повт.';
  } else if (numMatch) {
    val = numMatch[0];
    if (/мин/.test(meta)) unit = 'мин';
    else if (/сек/.test(meta)) unit = 'сек';
    else unit = 'подх.';
  } else {
    val = '—'; unit = '';
  }
  return { val, unit };
}

function saveProfile(profile) {
  localStorage.setItem('lazyless_user', JSON.stringify(profile));
  userProfile = profile;
}

function generateWeekPlan(profile) {
  const slots = TIME_OPTS.find(t => t.id === profile.time)?.slotsPerDay || 1;
  const pool = profile.goals.flatMap(gid => GOALS.find(g => g.id === gid)?.scenarios || []);
  const unique = [...new Set(pool)];

  // Always add stretch if not already there and time allows
  if (!unique.includes('stretch') && slots >= 2) unique.push('stretch');

  const DAYS = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
  const REST_NOTES = [
    'Активный отдых. Погуляй, подыши.',
    'День отдыха. Мышцы растут в покое.',
    'Полный отдых. Неделя почти сделана.',
  ];

  // workout days pattern: 2 on, 1 off, 2 on, 1 off, 1 off
  const pattern = [true, true, false, true, true, false, false];
  let scIdx = 0;
  let restIdx = 0;

  return DAYS.map((label, i) => {
    if (!pattern[i]) {
      return { label, name: 'Отдых', rest: true, restNote: REST_NOTES[restIdx++ % REST_NOTES.length] };
    }
    const dayScenarios = [];
    for (let s = 0; s < slots && unique.length > 0; s++) {
      dayScenarios.push(unique[scIdx % unique.length]);
      scIdx++;
    }
    const names = dayScenarios.map(id => SCENARIOS[id]?.name || id).join(' + ');
    return { label, name: names, scenarios: dayScenarios };
  });
}

        <div class="ob-welcome-tag">домашние тренировки</div>
        <div class="ob-title">Тренировки,<br>которые<br><span>реально помогают</span></div>
        <div class="ob-sub">Без зала, без оборудования.<br>Настроим программу под тебя — займёт минуту.</div>

        <div class="ob-footer">

        </div>
      </div>`;

  } else if (step === 2) {
    el.innerHTML = `
      <div class="ob-screen">
        ${obNav(2)}
        <div class="ob-title">Немного<br><span>о тебе</span></div>
        <div class="ob-body">
          <div class="ob-step" style="margin-bottom:8px">ПОЛ</div>
          <div class="gender-row" style="margin-bottom:24px">
            <button class="gender-pill ${obState.gender === 'male' ? 'selected' : ''}" onclick="obState.gender='male';renderOnboarding()">Мужской</button>
            <button class="gender-pill ${obState.gender === 'female' ? 'selected' : ''}" onclick="obState.gender='female';renderOnboarding()">Женский</button>
          </div>
          <div class="ob-step" style="margin-bottom:8px">ВОЗРАСТ</div>
          <input class="ob-name-input" type="number" placeholder="Лет" min="10" max="99"
            value="${obState.age}" oninput="obState.age=this.value" style="font-size:1.4rem">
        </div>
        <div class="ob-footer">
          <button class="ob-btn" onclick="obNext()">ДАЛЬШЕ</button>
        </div>
      </div>`;
  } else if (step === 3) {
    el.innerHTML = `
      <div class="ob-screen">
        ${obNav(3)}
        <div class="ob-title">Что хочешь<br><span>улучшить?</span></div>
        <div class="ob-sub">Отметь всё, что хочешь проработать</div>
        <div class="ob-body">
          <div class="ob-grid">
            ${GOALS.map(g => `
              <button class="ob-option ${obState.goals.includes(g.id) ? 'selected' : ''}"
                onclick="obToggleGoal('${g.id}')">
                <div class="ob-option-icon">${icon(g.icon, 28)}</div>
                <div class="ob-option-name">${g.name}</div>
                <div class="ob-option-desc">${g.desc}</div>
              </button>`).join('')}
          </div>
        </div>
        <div class="ob-footer">
          <button class="ob-btn" ${obState.goals.length === 0 ? 'disabled' : ''} onclick="obNext()">ДАЛЬШЕ</button>
        </div>
      </div>`;
  } else if (step === 4) {
    el.innerHTML = `
      <div class="ob-screen">
        ${obNav(4)}
        <div class="ob-title">Сколько минут<br><span>в день?</span></div>
        <div class="ob-body">
          <div class="ob-time-list">
            ${TIME_OPTS.map(t => `
              <button class="ob-time-opt ${obState.time === t.id ? 'selected' : ''}"
                onclick="obSelectTime(${t.id})">
                <div class="ob-time-val">${t.val}</div>
                <div class="ob-time-right">
                  <div class="ob-time-unit">МИНУТ</div>
                  <div class="ob-time-label">${t.label}</div>
                </div>
              </button>`).join('')}
          </div>
        </div>
        <div class="ob-footer">
          <button class="ob-btn" ${!obState.time ? 'disabled' : ''} onclick="obNext()">ДАЛЬШЕ</button>
        </div>
      </div>`;
  } else if (step === 5) {
    el.innerHTML = `
      <div class="ob-screen">
        ${obNav(5)}
        <div class="ob-title">Что есть<br><span>дома?</span></div>
        <div class="ob-sub">Отметь что есть — план подстроится</div>
        <div class="ob-body">
          <div class="equip-grid">
            ${EQUIPMENT.map(e => `
              <button class="equip-pill ${obState.equipment.includes(e.id) ? 'selected' : ''}"
                onclick="obToggleEquip('${e.id}')">
                ${icon(e.icon, 15)} ${e.label}
              </button>`).join('')}
          </div>
        </div>
        <div class="ob-footer">
          <button class="ob-btn" onclick="obFinish()">ГОТОВО</button>
        </div>
      </div>`;
  }
}

function obBack() {
  obState.step--;
  renderOnboarding();
}

function obNext() {
  obState.step++;
  renderOnboarding();
}

function obToggleGoal(id) {
  const idx = obState.goals.indexOf(id);
  if (idx >= 0) obState.goals.splice(idx, 1);
  else obState.goals.push(id);
  renderOnboarding();
}

function obSelectTime(id) {
  obState.time = id;
  renderOnboarding();
}

function obToggleEquip(id) {
  const idx = obState.equipment.indexOf(id);
  if (idx >= 0) obState.equipment.splice(idx, 1);
  else obState.equipment.push(id);
  renderOnboarding();
}

function obFinish() {
  const profile = {
    name: obState.name.trim(),
    gender: obState.gender,
    age: obState.age ? parseInt(obState.age) : null,
    goals: obState.goals,
    time: obState.time,
    equipment: obState.equipment,
  };
  saveProfile(profile);
  init();
}

// ─── STATE ───────────────────────────────────────────────

let WEEK_PLAN = [];

let state = {
  screen: 'workout',
  view: 'day',
  dayIdx: 0,
  activeScenario: null,
  activeContext: null,
};

let profileEdit = null;

let checked = {};
try { checked = JSON.parse(localStorage.getItem('wk3_checked') || '{}'); } catch(e) {}

function save() { localStorage.setItem('wk3_checked', JSON.stringify(checked)); }

const todayIdx = (() => {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
})();

function init() {
  if (!userProfile) {
    renderOnboarding();
    return;
  }
  WEEK_PLAN = generateWeekPlan(userProfile);
  state.dayIdx = todayIdx;
  state.screen = 'workout';
  document.querySelector('.app-header').style.display = '';
  render();
}

// ─── KEYS ────────────────────────────────────────────────

function exKey(context, scenarioId, secIdx, exIdx) {
  return `${context}_${scenarioId}_${secIdx}_${exIdx}`;
}

function getProgress(context, scenarioId) {
  const sc = SCENARIOS[scenarioId];
  if (!sc) return { total: 0, done: 0 };
  let total = 0, done = 0;
  sc.sections.forEach((sec, si) => {
    sec.exercises.forEach((ex, ei) => {
      total++;
      if (checked[exKey(context, scenarioId, si, ei)]) done++;
    });
  });
  return { total, done };
}

function getDayProgress(dayIdx) {
  const day = WEEK_PLAN[dayIdx];
  if (day.rest || !day.scenarios) return { total: 0, done: 0 };
  let total = 0, done = 0;
  day.scenarios.forEach(scId => {
    const p = getProgress('plan_' + dayIdx, scId);
    total += p.total;
    done += p.done;
  });
  return { total, done };
}

// ─── ACTIONS ─────────────────────────────────────────────

function toggleEx(secIdx, exIdx) {
  const k = exKey(state.activeContext, state.activeScenario, secIdx, exIdx);
  checked[k] = !checked[k];
  save();
  render();
}

function toggleHint(id) {
  const body = document.getElementById('h-' + id);
  const arrow = document.getElementById('a-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
}

function openScenario(scenarioId, context) {
  state.activeScenario = scenarioId;
  state.activeContext = context;
  state.view = 'workout';
  render();
}

function openExtra(scenarioId) {
  openScenario(scenarioId, 'extra_' + state.dayIdx + '_' + scenarioId);
}

function openPlanScenario(scenarioId) {
  openScenario(scenarioId, 'plan_' + state.dayIdx);
}

function goBack() {
  state.view = 'home';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function switchDay(idx) {
  state.dayIdx = idx;
  state.view = 'day';
  state.activeScenario = null;
  state.activeContext = null;
  render();
}

function resetCurrent() {
  if (!state.activeScenario || !state.activeContext) return;
  Object.keys(checked).forEach(k => {
    if (k.startsWith(state.activeContext + '_' + state.activeScenario)) delete checked[k];
  });
  save();
  render();
}

// ─── RENDER ──────────────────────────────────────────────

function renderTabs() {
  return `<div class="day-tabs">
    ${WEEK_PLAN.map((d, i) => {
      const isToday = i === todayIdx;
      const { total, done } = getDayProgress(i);
      const allDone = total > 0 && done === total;
      return `<button class="tab ${d.rest ? 'rest-tab' : ''} ${i === state.dayIdx ? 'active' : ''} ${isToday ? 'today-tab' : ''}"
        onclick="switchDay(${i})">${d.label}${allDone ? ' ✓' : ''}</button>`;
    }).join('')}
  </div>`;
}

function renderDayView() {
  const day = WEEK_PLAN[state.dayIdx];

  let html = renderTabs();

  html += `<div class="day-header">
    <div>
      <div class="day-title">${day.name}</div>
      ${state.dayIdx === todayIdx ? '<div class="day-subtitle">сегодня</div>' : ''}
    </div>
  </div>`;

  if (day.rest) {
    html += `<div class="rest-card">
      <div class="rest-emoji" style="color:var(--muted)">${icon('moon', 48)}</div>
      <div class="rest-title">День отдыха</div>
      <div class="rest-text">${day.restNote}</div>
    </div>`;
  } else {
    // Plan scenarios
    html += `<div class="plan-label">план дня</div>`;
    day.scenarios.forEach(scId => {
      const sc = SCENARIOS[scId];
      const ctx = 'plan_' + state.dayIdx;
      const { total, done } = getProgress(ctx, scId);
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      const allDone = done === total && total > 0;
      html += `
        <div class="plan-scenario ${allDone ? 'completed' : ''}">
          <div class="plan-scenario-header" onclick="openPlanScenario('${scId}')">
            <div class="sc-icon">${icon(sc.icon)}</div>
            <div class="sc-info">
              <div class="sc-name">${sc.name}</div>
              <div class="sc-meta">${sc.time} · ${sc.desc}</div>
            </div>
            <div class="sc-progress">${done}/${total}</div>
          </div>
          <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        </div>
      `;
    });
  }

  // Extra section — all scenarios
  html += `<div class="divider"><div class="divider-line"></div><div class="divider-text">ЕЩЁ / ПО НАСТРОЕНИЮ</div><div class="divider-line"></div></div>`;
  html += `<div class="extra-grid">`;
  Object.values(SCENARIOS).forEach(sc => {
    const ctx = 'extra_' + state.dayIdx + '_' + sc.id;
    const { total, done } = getProgress(ctx, sc.id);
    const hasDone = done > 0;
    html += `
      <button class="extra-btn ${hasDone ? 'has-done' : ''}" onclick="openExtra('${sc.id}')">
        <div class="extra-icon">${icon(sc.icon)}</div>
        <div class="extra-name">${sc.name}${hasDone ? ' ·' + done + '/' + total : ''}</div>
        <div class="extra-time">${sc.time}</div>
      </button>
    `;
  });
  html += `</div>`;

  return html;
}

function renderWorkoutView() {
  const sc = SCENARIOS[state.activeScenario];
  if (!sc) return renderDayView();

  const { total, done } = getProgress(state.activeContext, state.activeScenario);
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const allDone = done === total && total > 0;

  let html = `<div class="back-btn" onclick="goBack()">← назад</div>`;
  html += `<div class="progress-row"><span style="display:flex;align-items:center;gap:6px">${icon(sc.icon, 16)} ${sc.name}</span><span style="color:var(--accent)">${done}/${total}</span></div>`;
  html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

  if (allDone) {
    html += `<div class="done-screen">
      <div class="done-emoji" style="color:var(--accent)">${icon('check-fat', 52)}</div>
      <div class="done-title">Сделано!</div>
      <div class="done-sub">Хорошая работа. Тело скажет спасибо.</div>
    </div>`;
  }

  sc.sections.forEach((sec, si) => {
    html += `<div class="section-label">${sec.title}</div>`;
    sec.exercises.forEach((ex, ei) => {
      const isDone = !!checked[exKey(state.activeContext, state.activeScenario, si, ei)];
      const hid = `${state.activeContext}_${state.activeScenario}_${si}_${ei}`;
      const tags = ex.tags.map(t => `<span class="tag ${TAGS[t].cls}">${TAGS[t].label}</span>`).join('');
      const { val: mVal, unit: mUnit } = parseMeta(ex.meta);
      html += `
        <div class="ex-card ${isDone ? 'done' : ''}">
          <div class="ex-main" onclick="toggleEx(${si}, ${ei})">
            <div class="checkbox"><span class="check-icon">✓</span></div>
            <div class="ex-body">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-tags">${tags}</div>
            </div>
            <div class="ex-stat">
              <div class="ex-stat-val">${mVal}</div>
              <div class="ex-stat-unit">${mUnit}</div>
            </div>
          </div>
          <div class="hint-toggle" onclick="toggleHint('${hid}')">
            <span class="hint-arrow" id="a-${hid}"></span>
            <span>как делать</span>
          </div>
          <div class="hint-body" id="h-${hid}">
            <ol>${ex.hint.map(h => `<li>${h}</li>`).join('')}</ol>
            ${ex.warn ? `<div class="warn">⚠ ${ex.warn}</div>` : ''}
          </div>
        </div>
      `;
    });
  });

  html += `<button class="reset-btn" onclick="resetCurrent()">↺ СБРОСИТЬ</button>`;
  return html;
}

function renderBottomNav() {
  const s = state.screen;
  return `<nav class="bottom-nav">
    <button class="nav-btn ${s === 'progress' ? 'active' : ''}" onclick="switchScreen('progress')">${icon('chart-line', 22)}</button>
    <button class="nav-btn disabled">${icon('fork-knife', 22)}</button>
    <button class="nav-btn-center" onclick="switchScreen('workout')">
      <div class="nav-center-circle">${icon('barbell', 20)}</div>
    </button>
    <button class="nav-btn ${s === 'achievements' ? 'active' : ''}" onclick="switchScreen('achievements')">${icon('trophy', 22)}</button>
    <button class="nav-btn ${s === 'profile' ? 'active' : ''}" onclick="switchScreen('profile')">${icon('user', 22)}</button>
  </nav>`;
}

function switchScreen(screen) {
  if (screen === 'profile') {
    profileEdit = {
      name: userProfile.name || '',
      gender: userProfile.gender || null,
      age: userProfile.age || '',
      goals: [...(userProfile.goals || [])],
      time: userProfile.time || null,
      equipment: [...(userProfile.equipment || [])],
      avatar: userProfile.avatar || null,
    };
  }
  state.screen = screen;
  render();
}

function profileToggleGoal(id) {
  const idx = profileEdit.goals.indexOf(id);
  if (idx >= 0) profileEdit.goals.splice(idx, 1);
  else profileEdit.goals.push(id);
  render();
}

function profileToggleEquip(id) {
  if (!profileEdit.equipment) profileEdit.equipment = [];
  const idx = profileEdit.equipment.indexOf(id);
  if (idx >= 0) profileEdit.equipment.splice(idx, 1);
  else profileEdit.equipment.push(id);
  render();
}

function saveProfileEdit() {
  userProfile = { ...userProfile, ...profileEdit };
  saveProfile(userProfile);
  WEEK_PLAN = generateWeekPlan(userProfile);
  state.screen = 'workout';
  profileEdit = null;
  render();
}

function handleAvatarUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { profileEdit.avatar = e.target.result; render(); };
  reader.readAsDataURL(file);
}

function renderProfile() {
  const pe = profileEdit;
  return `
    <div style="padding-bottom:32px">
      <div class="profile-avatar" onclick="document.getElementById('av-input').click()">
        ${pe.avatar ? `<img src="${pe.avatar}">` : `<span style="color:var(--muted)">${icon('user', 36)}</span>`}
        <div class="avatar-edit">${icon('camera', 12)}</div>
      </div>
      <input type="file" id="av-input" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)">

      <div class="profile-section">ИМЯ</div>
      <input class="profile-field" type="text" value="${pe.name || ''}"
        oninput="profileEdit.name=this.value" placeholder="Имя">

      <div class="profile-section">ПОЛ</div>
      <div class="gender-row">
        <button class="gender-pill ${pe.gender === 'male' ? 'selected' : ''}" onclick="profileEdit.gender='male';render()">Мужской</button>
        <button class="gender-pill ${pe.gender === 'female' ? 'selected' : ''}" onclick="profileEdit.gender='female';render()">Женский</button>
      </div>

      <div class="profile-section">ВОЗРАСТ</div>
      <input class="profile-field" type="number" value="${pe.age || ''}" min="10" max="99"
        oninput="profileEdit.age=this.value" placeholder="Лет">

      <div class="profile-section">ЦЕЛИ</div>
      <div class="ob-grid">
        ${GOALS.map(g => `
          <button class="ob-option ${(pe.goals||[]).includes(g.id) ? 'selected' : ''}"
            onclick="profileToggleGoal('${g.id}')">
            <div class="ob-option-icon">${icon(g.icon, 28)}</div>
            <div class="ob-option-name">${g.name}</div>
            <div class="ob-option-desc">${g.desc}</div>
          </button>`).join('')}
      </div>

      <div class="profile-section">ВРЕМЯ ТРЕНИРОВКИ</div>
      <div class="ob-time-list">
        ${TIME_OPTS.map(t => `
          <button class="ob-time-opt ${pe.time === t.id ? 'selected' : ''}"
            onclick="profileEdit.time=${t.id};render()">
            <div class="ob-time-val">${t.val}</div>
            <div class="ob-time-right">
              <div class="ob-time-unit">МИНУТ</div>
              <div class="ob-time-label">${t.label}</div>
            </div>
          </button>`).join('')}
      </div>

      <div class="profile-section">ИНВЕНТАРЬ</div>
      <div class="equip-grid">
        ${EQUIPMENT.map(e => `
          <button class="equip-pill ${(pe.equipment||[]).includes(e.id) ? 'selected' : ''}"
            onclick="profileToggleEquip('${e.id}')">
            ${icon(e.icon, 14)} ${e.label}
          </button>`).join('')}
      </div>

      <button class="save-btn" onclick="saveProfileEdit()">СОХРАНИТЬ</button>
    </div>
    ${renderBottomNav()}`;
}

function renderPlaceholder(title, iconName, msg) {
  return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted)">
    ${icon(iconName, 48)}
    <div style="font-family:'Unbounded',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text)">${title}</div>
    <div style="font-size:0.8rem;text-align:center;max-width:220px;line-height:1.5">${msg}</div>
  </div>${renderBottomNav()}`;
}

function renderWorkoutHome() {
  const day = WEEK_PLAN[state.dayIdx];
  const { total, done } = getDayProgress(state.dayIdx);

  const weekStrip = `<div style="display:flex;gap:6px;margin-bottom:28px;overflow-x:auto;padding-bottom:4px">
    ${WEEK_PLAN.map((d, i) => {
      const isToday = i === todayIdx;
      const isSel = i === state.dayIdx;
      const { total: t, done: dn } = getDayProgress(i);
      const allDone = t > 0 && dn === t;
      return `<button onclick="state.dayIdx=${i};render()" style="
        flex-shrink:0;width:40px;height:52px;border-radius:12px;border:1px solid ${isSel ? 'var(--accent)' : 'var(--border)'};
        background:${isSel ? 'var(--accent)' : 'transparent'};
        color:${isSel ? '#000' : isToday ? 'var(--text)' : 'var(--muted)'};
        font-family:'Unbounded',sans-serif;font-size:0.5rem;font-weight:700;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer">
        <span>${d.label}</span>
        <span style="font-size:0.55rem">${allDone ? '✓' : d.rest ? '—' : ''}</span>
      </button>`;
    }).join('')}
  </div>`;

  let card;
  if (day.rest) {
    card = `<div style="background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 24px;text-align:center">
      <div style="color:var(--muted);margin-bottom:16px">${icon('moon', 48)}</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:1.1rem;font-weight:900;margin-bottom:8px">День отдыха</div>
      <div style="color:var(--muted);font-size:0.85rem;line-height:1.6">${day.restNote}</div>
    </div>`;
  } else {
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    const allDone = done === total && total > 0;
    card = `<div style="background:var(--card);border:1px solid ${allDone ? 'var(--accent)' : 'var(--border)'};border-radius:20px;padding:28px 24px">
      <div style="font-size:0.65rem;color:var(--muted);font-family:'Unbounded',sans-serif;letter-spacing:0.08em;margin-bottom:8px">${state.dayIdx === todayIdx ? 'СЕГОДНЯ' : WEEK_PLAN[state.dayIdx].label}</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:1.3rem;font-weight:900;line-height:1.2;margin-bottom:6px">${day.name}</div>
      <div style="color:var(--muted);font-size:0.8rem;margin-bottom:20px">${total} упражнений · ${userProfile?.time || 30} минут</div>
      ${total > 0 ? `<div style="background:var(--border);border-radius:4px;height:4px;margin-bottom:20px">
        <div style="background:var(--accent);height:4px;border-radius:4px;width:${pct}%;transition:width 0.3s"></div>
      </div>` : ''}
      ${allDone
        ? `<div style="text-align:center;color:var(--accent);font-family:'Unbounded',sans-serif;font-size:0.75rem;font-weight:700;padding:16px 0">${icon('check-fat', 24)} ВЫПОЛНЕНО</div>`
        : `<button onclick="startWorkout()" style="width:100%;padding:18px;background:var(--accent);border:none;border-radius:14px;color:#000;font-family:'Unbounded',sans-serif;font-size:0.8rem;font-weight:900;letter-spacing:0.05em;cursor:pointer">
            ${done > 0 ? 'ПРОДОЛЖИТЬ' : 'НАЧАТЬ ТРЕНИРОВКУ'}
          </button>`
      }
    </div>`;
  }

  return weekStrip + card + renderBottomNav();
}

function startWorkout() {
  const day = WEEK_PLAN[state.dayIdx];
  if (!day.scenarios?.length) return;
  state.view = 'workout';
  state.activeScenario = day.scenarios[0];
  state.activeContext = 'plan_' + state.dayIdx;
  render();
}

function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'profile':      app.innerHTML = renderProfile(); break;
    case 'progress':     app.innerHTML = renderPlaceholder('Прогресс', 'chart-line', 'История тренировок и стрики появятся здесь'); break;
    case 'achievements': app.innerHTML = renderPlaceholder('Успехи', 'trophy', 'Твои достижения и бейджи появятся здесь'); break;
    default:
      if (state.view === 'workout') app.innerHTML = renderWorkoutView() + renderBottomNav();
      else app.innerHTML = renderWorkoutHome();
  }
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
